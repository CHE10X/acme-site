<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="oc-title oc-desc">
  <title id="oc-title">OpenClaw Reliability Stack</title>
  <desc id="oc-desc">Layered architecture diagram of the OpenClaw reliability stack showing agent runtime, memory integrity, hygiene, observe, recovery, and operator signals.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .t-title  { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .t-sub    { font-size: 13px; fill: #64748b; }
      .t-sec    { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; fill: #94a3b8; }
      .t-layer  { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; fill: #475569; }
      .t-cap    { font-size: 10.5px; fill: #94a3b8; font-style: italic; }
      .t-node   { font-size: 12px; font-weight: 600; fill: #1e293b; }
      .t-nsub   { font-size: 9.5px; fill: #94a3b8; font-style: italic; }
      .t-ann    { font-size: 10.5px; fill: #64748b; }
      .t-sig    { font-size: 11px; font-weight: 600; fill: #166534; }
      .t-cp     { font-size: 12px; font-weight: 700; fill: #334155; }
      .t-cpsub  { font-size: 10px; fill: #64748b; font-style: italic; }
      .t-loop   { font-size: 9.5px; fill: #3b82f6; }
      .t-leg    { font-size: 11px; fill: #64748b; }
      .n-entry       { fill: #f1f5f9; stroke: #334155; stroke-width: 2; }
      .n-entry-inner { fill: none;    stroke: #334155; stroke-width: 1; }
      .leg-bg { fill: #fff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
    <marker id="mh-gray"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7z" fill="#94a3b8"/></marker>
    <marker id="mh-blue"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7z" fill="#3b82f6"/></marker>
    <marker id="mh-lblue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7z" fill="#93c5fd"/></marker>
    <marker id="mh-green" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7z" fill="#22c55e"/></marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="960" fill="#ffffff"/>

  <!-- ── HEADER ───────────────────────────────────────────────────────── -->
  <text class="t-title" x="56" y="40">OpenClaw Reliability Stack</text>
  <text class="t-sub"   x="56" y="62">Memory integrity, runtime hygiene, diagnostics, and deterministic recovery for AI agent systems.</text>

  <!-- ── SECTION HEADERS ─────────────────────────────────────────────── -->
  <!-- Left: engine -->
  <text class="t-sec" x="448" y="84" text-anchor="middle">OPENCLAW RELIABILITY ENGINE</text>
  <!-- Right: signals -->
  <text class="t-sec" x="1116" y="84" text-anchor="middle">OPERATOR SIGNALS</text>

  <!-- ── VERTICAL SEPARATOR ─────────────────────────────────────────── -->
  <line x1="854" y1="76" x2="854" y2="892"
        stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ── CONTROL PLANE (top right, dashed optional) ─────────────────── -->
  <rect x="868" y="92" width="504" height="64" rx="10"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text class="t-cp"    x="1120" y="118" text-anchor="middle">OpenClaw Control Plane</text>
  <text class="t-cpsub" x="1120" y="138" text-anchor="middle">Fleet reliability monitoring · optional</text>

  <!-- ── RECOVERY LOOP — left spine ─────────────────────────────────── -->
  <!-- Recover band midpoint y=753, Runtime band midpoint y=325 -->
  <path d="M56,753 H22 V325 H56"
        stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="7 4" fill="none"
        marker-end="url(#mh-blue)"/>
  <text text-anchor="middle" font-size="12px" font-weight="700" fill="#1d4ed8"
        transform="rotate(-90,18,539)" x="18" y="543">Recovery Loop</text>

  <!--
    BAND LAYOUT (x=56, width=784):
      Band 1 Operator:      y=172  h=96   bottom=268
      Band 2 Agent Runtime: y=280  h=90   bottom=370
      Band 3 Memory:        y=382  h=96   bottom=478
      Band 4 Hygiene:       y=490  h=90   bottom=580
      Band 5 Observe:       y=592  h=104  bottom=696
      Band 6 Recover:       y=708  h=90   bottom=798
    All use inline fill/stroke to avoid CSS render issues.
  -->

  <!-- ── BAND 1: OPERATOR SURFACE ───────────────────────────────────── -->
  <rect x="56" y="172" width="784" height="96" rx="10"
        fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="190">OPERATOR SURFACE</text>

  <!-- Operator (double border) -->
  <rect class="n-entry"       x="76"  y="220" width="106" height="34" rx="7"/>
  <rect class="n-entry-inner" x="80"  y="224" width="98"  height="26" rx="5"/>
  <text class="t-node" x="104" y="242">Operator</text>

  <!-- Support -->
  <rect x="202" y="220" width="194" height="34" rx="7"
        fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text class="t-node" x="222" y="242">Support / GitHub / Tawk</text>

  <!-- Bot Shop (double border) -->
  <rect class="n-entry"       x="416" y="220" width="92"  height="34" rx="7"/>
  <rect class="n-entry-inner" x="420" y="224" width="84"  height="26" rx="5"/>
  <text class="t-node" x="435" y="242">Bot Shop</text>

  <!-- OCTriage — emphasized: thick blue border, tinted fill, subtitle -->
  <rect x="528" y="216" width="164" height="42" rx="7"
        fill="#eff6ff" stroke="#1d4ed8" stroke-width="3"/>
  <text class="t-node" x="550" y="235" fill="#1d4ed8">OCTriage</text>
  <text class="t-nsub" x="550" y="250" fill="#3b82f6">(diagnostic entrypoint)</text>

  <!-- octriage -watch (double border) -->
  <rect class="n-entry"       x="712" y="220" width="114" height="34" rx="7"/>
  <rect class="n-entry-inner" x="716" y="224" width="106" height="26" rx="5"/>
  <text class="t-node" x="730" y="242">octriage -watch</text>

  <!-- ── BAND 2: OPENCLAW AGENT RUNTIME ──────────────────────────────── -->
  <rect x="56" y="280" width="784" height="90" rx="10"
        fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="298">OPENCLAW AGENT RUNTIME</text>

  <rect x="76"  y="310" width="100" height="34" rx="7" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text class="t-node" x="100" y="332">Agents</text>

  <rect x="196" y="310" width="110" height="34" rx="7" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text class="t-node" x="216" y="332">Gateway</text>

  <rect x="326" y="310" width="130" height="34" rx="7" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text class="t-node" x="340" y="332">Session Store</text>

  <rect x="476" y="310" width="120" height="34" rx="7" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text class="t-node" x="498" y="332">Workspace</text>

  <!-- ── BAND 3: OPENCLAW MEMORY ─────────────────────────────────────── -->
  <rect x="56" y="382" width="784" height="96" rx="10"
        fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="400">OPENCLAW MEMORY</text>
  <text class="t-cap"   x="76" y="414">Deterministic rehydration and context continuity</text>

  <rect x="76"  y="426" width="100" height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="100" y="448">Elixir</text>

  <rect x="196" y="426" width="112" height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="212" y="448">DriftGuard</text>

  <rect x="328" y="426" width="76"  height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="347" y="448">BOOT</text>

  <rect x="424" y="426" width="86"  height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="440" y="448">DIGEST</text>

  <rect x="530" y="426" width="96"  height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="542" y="448">ANCHORS</text>

  <rect x="646" y="426" width="122" height="34" rx="7" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text class="t-node" x="657" y="448">ORIENTATION</text>

  <!-- ── BAND 4: OPENCLAW HYGIENE ────────────────────────────────────── -->
  <rect x="56" y="490" width="784" height="90" rx="10"
        fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="508">OPENCLAW HYGIENE</text>
  <text class="t-cap"   x="76" y="522">Continuous runtime observation and anomaly detection</text>

  <rect x="76"  y="536" width="118" height="34" rx="7" fill="#fff" stroke="#ea580c" stroke-width="1.5"/>
  <text class="t-node" x="97" y="558">Watchdog</text>

  <rect x="214" y="536" width="106" height="34" rx="7" fill="#fff" stroke="#ea580c" stroke-width="1.5"/>
  <text class="t-node" x="235" y="558">Sentinel</text>

  <!-- ── BAND 5: OPENCLAW OBSERVE ────────────────────────────────────── -->
  <rect x="56" y="592" width="784" height="104" rx="10"
        fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="610">OPENCLAW OBSERVE</text>
  <text class="t-cap"   x="76" y="624">Topology, runtime signals, and reliability scoring</text>

  <!-- FindMyAgent + subtitle -->
  <rect x="76"  y="638" width="130" height="34" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text class="t-node" x="90" y="660">FindMyAgent</text>
  <text class="t-nsub" text-anchor="middle" x="141" y="682">(agent topology)</text>

  <!-- RadCheck + subtitle -->
  <rect x="226" y="638" width="108" height="34" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text class="t-node" x="246" y="660">RadCheck</text>
  <text class="t-nsub" text-anchor="middle" x="280" y="682">(reliability scoring)</text>

  <!-- Observe Aggregator + subtitle -->
  <rect x="354" y="638" width="168" height="34" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text class="t-node" x="367" y="660">Observe Aggregator</text>
  <text class="t-nsub" text-anchor="middle" x="438" y="682">(signal fusion)</text>

  <!-- ── BAND 6: OPENCLAW RECOVER ────────────────────────────────────── -->
  <rect x="56" y="708" width="784" height="90" rx="10"
        fill="#ffe4e6" stroke="#fda4af" stroke-width="1.5"/>
  <text class="t-layer" x="76" y="726">OPENCLAW RECOVER</text>
  <text class="t-cap"   x="76" y="740">Deterministic remediation and recovery readiness</text>

  <rect x="76"  y="754" width="78"  height="34" rx="7" fill="#fff" stroke="#e11d48" stroke-width="1.5"/>
  <text class="t-node" x="99" y="776">ORP</text>

  <rect x="174" y="754" width="110" height="34" rx="7" fill="#fff" stroke="#e11d48" stroke-width="1.5"/>
  <text class="t-node" x="194" y="776">Agent911</text>

  <rect x="304" y="754" width="98"  height="34" rx="7" fill="#fff" stroke="#e11d48" stroke-width="1.5"/>
  <text class="t-node" x="326" y="776">Lazarus</text>

  <!-- ══ PRIMARY DOWNWARD FLOW ARROWS (center x=480) ════════════════ -->
  <path d="M480,268 V280" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#mh-gray)"/>
  <path d="M480,370 V382" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#mh-gray)"/>
  <path d="M480,478 V490" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#mh-gray)"/>
  <path d="M480,580 V592" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#mh-gray)"/>
  <path d="M480,696 V708" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#mh-gray)"/>

  <!-- ══ RIGHT COLUMN: OPERATOR SIGNALS ════════════════════════════
       Signal boxes x=876 (left edge), varying widths.
       Aligned to source band y-centers where possible.
  ══════════════════════════════════════════════════════════════════ -->

  <!-- "Signals" sub-header -->
  <text class="t-ann" x="876" y="178" font-weight="700" fill="#334155">Output Signals</text>

  <!-- Proof Bundles (from OCTriage / Memory) -->
  <rect x="876" y="192" width="128" height="34" rx="7"
        fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text class="t-sig" x="892" y="214">Proof Bundles</text>

  <!-- Gap zone: Memory + Hygiene annotations (y=400–570) -->
  <text class="t-ann" x="876" y="416" fill="#94a3b8" font-style="italic" font-size="9.5">MEMORY</text>
  <text class="t-ann" x="876" y="430">BOOT → Agent Session Startup</text>
  <text class="t-ann" x="876" y="444">DIGEST → Agent Rehydration</text>
  <text class="t-ann" x="876" y="458">ANCHORS → Persistent Facts</text>
  <text class="t-ann" x="876" y="472">ORIENTATION → Ecosystem Routing</text>

  <text class="t-ann" x="876" y="514" fill="#94a3b8" font-style="italic" font-size="9.5">HYGIENE</text>
  <text class="t-ann" x="876" y="528">Watchdog → Runtime Signals</text>
  <text class="t-ann" x="876" y="542">Sentinel → Predictive Alerts</text>

  <!-- Reliability Score (from Observe / RadCheck) -->
  <rect x="876" y="610" width="152" height="34" rx="7"
        fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text class="t-sig" x="892" y="632">Reliability Score</text>

  <!-- Protection Report (from Observe) -->
  <rect x="876" y="652" width="152" height="34" rx="7"
        fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text class="t-sig" x="892" y="674">Protection Report</text>

  <!-- ORP Report (from Recover) -->
  <rect x="876" y="718" width="112" height="34" rx="7"
        fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text class="t-sig" x="892" y="740">ORP Report</text>

  <!-- Recovery Status (from Recover) -->
  <rect x="876" y="758" width="144" height="34" rx="7"
        fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text class="t-sig" x="892" y="780">Recovery Status</text>

  <!-- ══ ARTIFACT ARROWS: Bands → Signal boxes (green dashed) ═══════ -->

  <!-- OCTriage → Proof Bundles (horizontal, crosses separator) -->
  <path d="M692,237 H876"
        stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" fill="none"
        marker-end="url(#mh-green)"/>

  <!-- Observe band right → Reliability Score -->
  <path d="M840,635 H876"
        stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" fill="none"
        marker-end="url(#mh-green)"/>

  <!-- Observe band right → Protection Report -->
  <path d="M840,669 H876"
        stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" fill="none"
        marker-end="url(#mh-green)"/>

  <!-- Recover band right → ORP Report -->
  <path d="M840,735 H876"
        stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" fill="none"
        marker-end="url(#mh-green)"/>

  <!-- Recover band right → Recovery Status -->
  <path d="M840,775 H876"
        stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" fill="none"
        marker-end="url(#mh-green)"/>

  <!-- ══ FLEET ARROWS: 3 signals → Control Plane (light blue, spine) ═
       Spine at x=1340. Stubs from signal right edges to spine.
       Vertical spine from y=783 up to y=156 (CP box bottom).
  ══════════════════════════════════════════════════════════════════ -->

  <!-- Stubs: signal right → spine -->
  <path d="M1028,627 H1340"
        stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <path d="M1028,669 H1340"
        stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <path d="M1020,775 H1340"
        stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>

  <!-- Spine: upward to Control Plane -->
  <path d="M1340,775 V156"
        stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 4" fill="none"
        marker-end="url(#mh-lblue)"/>

  <!-- Fleet label -->
  <text font-size="11px" font-weight="700" fill="#3b82f6" text-anchor="middle"
        transform="rotate(-90,1346,480)" x="1346" y="484">Fleet signals</text>

  <!-- ══ LEGEND ══════════════════════════════════════════════════════ -->
  <rect class="leg-bg" x="56" y="820" width="688" height="116" rx="10"/>
  <text x="76" y="842" style="font-size:12px;font-weight:700;fill:#0f172a;">Legend</text>

  <line x1="76"  y1="858" x2="136" y2="858" stroke="#94a3b8" stroke-width="2" marker-end="url(#mh-gray)"/>
  <text class="t-leg" x="150" y="862">Active dependency / primary data flow</text>

  <line x1="76"  y1="876" x2="136" y2="876" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="7 4" marker-end="url(#mh-blue)"/>
  <text class="t-leg" x="150" y="880">Recovery Loop — Recover feeds back to Agent Runtime</text>

  <line x1="76"  y1="894" x2="136" y2="894" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#mh-green)"/>
  <text class="t-leg" x="150" y="898">Generated operator signal / proof output</text>

  <line x1="76"  y1="912" x2="136" y2="912" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#mh-lblue)"/>
  <text class="t-leg" x="150" y="916">Fleet signal → Control Plane (optional)</text>

  <rect x="76" y="920" width="50" height="18" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <rect x="80" y="924" width="42" height="10" rx="3" fill="none" stroke="#334155" stroke-width="1"/>
  <text class="t-leg" x="150" y="934">Operator-facing surface (double border)</text>

  <!-- FOOTER -->
  <text class="t-cap" x="56" y="952">
    OpenClaw Reliability Engine → Operator Signals → Control Plane (optional fleet monitoring)
  </text>

</svg>
