  <rect class="sys" x="910" y="270" width="160" height="44" rx="12" />
  <text class="font node" x="954" y="297">Workspace</text>

  <rect class="band memory" x="80" y="360" width="1240" height="180" rx="16" />
  <text class="font section" x="102" y="386">Memory Integrity Layer</text>
  <text class="font section" x="102" y="408">Keeps agents context-stable across disruption</text>
  <rect class="memory-node" x="130" y="432" width="330" height="88" rx="14" />
  <text class="font node" x="150" y="456">Elixir</text>
  <text class="font node" x="230" y="456">DriftGuard</text>
  <rect class="memory-node" x="150" y="468" width="70" height="34" rx="10" />
  <text class="font node" x="167" y="490">BOOT</text>
  <rect class="memory-node" x="232" y="468" width="86" height="34" rx="10" />
  <text class="font node" x="247" y="490">DIGEST</text>
  <rect class="memory-node" x="330" y="468" width="96" height="34" rx="10" />
  <text class="font node" x="343" y="490">ANCHORS</text>

  <rect class="memory-node" x="500" y="432" width="170" height="44" rx="12" />
  <text class="font node" x="516" y="459">ORIENTATION</text>

  <rect class="band hygiene" x="80" y="560" width="1240" height="100" rx="16" />
  <text class="font section" x="102" y="586">Runtime Hygiene Layer</text>
  <text class="font section" x="102" y="608">Continuously watches for stalls, silence, and degradation</text>
  <rect class="hygiene-node" x="320" y="604" width="170" height="40" rx="12" />
  <text class="font node" x="365" y="630">Watchdog</text>
  <rect class="hygiene-node" x="520" y="604" width="170" height="40" rx="12" />
  <text class="font node" x="572" y="630">Sentinel</text>

  <rect class="band diag" x="80" y="680" width="1240" height="120" rx="16" />
  <text class="font section" x="102" y="706">Diagnostic Layer</text>
  <text class="font section" x="102" y="728">Diagnostics: Explains what is happening</text>
  <rect class="diag-node" x="300" y="734" width="640" height="54" rx="14" />
  <rect class="diag-node" x="320" y="744" width="170" height="36" rx="11" />
  <rect class="entry" x="315" y="739" width="180" height="46" rx="13" />
  <text class="font node" x="373" y="767">OCTriage</text>
  <rect class="diag-node" x="520" y="744" width="160" height="36" rx="11" />
  <text class="font node" x="570" y="767">RadCheck</text>
  <rect class="diag-node" x="710" y="744" width="200" height="36" rx="11" />
  <text class="font node" x="758" y="767">FindMyAgent</text>

  <rect class="band recovery" x="80" y="820" width="1240" height="100" rx="16" />
  <text class="font section" x="102" y="846">Recovery Layer</text>
  <text class="font section" x="102" y="868">Recovery: Restores safe operation</text>
  <rect class="recovery-node" x="500" y="864" width="170" height="40" rx="12" />
  <text class="font node" x="548" y="890">Agent911</text>
  <rect class="recovery-node" x="710" y="864" width="160" height="40" rx="12" />
  <text class="font node" x="761" y="890">Lazarus</text>

  <rect class="band artifact" x="80" y="930" width="1240" height="54" rx="16" />
  <text class="font section" x="102" y="952">Artifacts / Outputs</text>
  <text class="font section" x="102" y="972">Artifacts: Shows evidence of value</text>
  <rect class="output-pill" x="330" y="944" width="170" height="28" rx="14" />
  <text class="font node" x="360" y="963">Proof Bundles</text>
  <rect class="output-pill" x="520" y="944" width="180" height="28" rx="14" />
  <text class="font node" x="544" y="963">Reliability Score</text>
  <rect class="output-pill" x="730" y="944" width="110" height="28" rx="14" />
  <text class="font node" x="764" y="963">Alerts</text>
  <rect class="output-pill" x="860" y="944" width="180" height="28" rx="14" />
  <text class="font node" x="888" y="963">Recovery Plans</text>

  <path class="flow" d="M700 182 V270" />
  <path class="flow" d="M240 314 V432" />
  <path class="flow" d="M405 644 V744" />
  <path class="flow" d="M600 644 V744" />
  <path class="flow" d="M600 780 V864" />
  <path class="flow" d="M540 884 V836 H615 V314" />

  <path class="flow" d="M185 468 V322 H455 V314" />
  <text class="font node" x="246" y="334">BOOT → Agent Session Startup</text>

  <path class="flow" d="M275 468 V334 H795 V314" />
  <text class="font node" x="556" y="334">DIGEST → Agent Rehydration</text>

  <path class="flow" d="M378 468 V326 H990 V314" />
  <text class="font node" x="906" y="334">ANCHORS → Persistent System Facts</text>

  <path class="flow" d="M585 432 V338 H615 V314" />
  <text class="font node" x="620" y="351">ORIENTATION → Ecosystem Routing</text>

  <path class="flow" d="M405 604 V350 H615 V314" />
  <text class="font node" x="420" y="364">Watchdog → Gateway Probe</text>

  <path class="flow" d="M405 604 V338 H455 V314" />
  <text class="font node" x="238" y="351">Watchdog → Stall Detection</text>

  <path class="flow" d="M605 604 V338 H455 V314" />
  <text class="font node" x="618" y="351">Sentinel → Anomaly Detection</text>

  <path class="flow" d="M605 644 V744" />
  <text class="font node" x="616" y="694">Sentinel → Trigger RadCheck</text>

  <path class="flow" d="M810 744 V340 H795 V314" />
  <text class="font node" x="818" y="359">FindMyAgent → Session / Agent Topology</text>

  <path class="flow" d="M585 864 H710" />
  <text class="font node" x="594" y="857">Agent911 → Recovery Decision</text>

  <path class="evidence" d="M810 884 V944" />
  <text class="font node" x="818" y="930">Lazarus → Recovery Execution Plan</text>

  <path class="evidence" d="M405 780 V944" />
  <text class="font node" x="248" y="874">OCTriage → Proof Bundle</text>
  <path class="evidence" d="M600 780 V944" />
  <text class="font node" x="576" y="874">RadCheck → Reliability Score</text>

  <path class="evidence" d="M990 432 V944 H785" />
  <text class="font node" x="1000" y="706">Memory Integrity → Artifacts / Outputs</text>

  <path class="evidence" d="M870 884 V944" />
  <text class="font node" x="875" y="918">Recovery Layer → Artifacts / Outputs</text>

  <path class="evidence" d="M710 780 V944" />
  <text class="font node" x="714" y="860">Diagnostic Layer → Artifacts / Outputs</text>

  <rect class="legend-box" x="1070" y="30" width="250" height="96" rx="14" />
  <path class="flow" d="M1090 58 H1160" />
  <text class="font node" x="1170" y="62">Active runtime dependency</text>
  <path class="evidence" d="M1090 88 H1160" />
  <text class="font node" x="1170" y="92">Generated output / evidence</text>
  <rect class="diag-node" x="1090" y="102" width="34" height="16" rx="6" />
  <rect class="entry" x="1087" y="99" width="40" height="22" rx="8" />
  <text class="font node" x="1136" y="114">Operator-facing entrypoint</text>

  <text class="font section" x="80" y="997">OpenClaw combines deterministic agent rehydration, runtime hygiene, diagnostics, and autonomous recovery into a single reliability stack for AI agent systems.</text>
</svg>
