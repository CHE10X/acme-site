<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Reliability Stack</title>
  <desc id="desc">Layered diagram of the OpenClaw reliability stack showing runtime, memory integrity, monitoring, diagnostics, and recovery.</desc>
  <defs>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #f4f4f5; }
      .section { font-size: 16px; font-weight: 600; fill: #d4d4d8; }
      .node { font-size: 13px; font-weight: 600; fill: #e4e4e7; }
      .band { fill: #0b1020; stroke: #334155; stroke-width: 2; }
      .runtime { fill: rgba(52, 211, 153, 0.07); }
      .memory { fill: rgba(20, 184, 166, 0.11); }
      .hygiene { fill: rgba(245, 158, 11, 0.1); }
      .diag { fill: rgba(99, 102, 241, 0.1); }
      .recovery { fill: rgba(248, 113, 113, 0.1); }
      .artifact { fill: rgba(34, 197, 94, 0.12); }
      .sys { fill: #121826; stroke: #475569; stroke-width: 2; }
      .memory-node { fill: #0f2430; stroke: #0ea5a4; stroke-width: 2; }
      .hygiene-node { fill: #2a1d0d; stroke: #f59e0b; stroke-width: 2; }
      .diag-node { fill: #1c1d38; stroke: #818cf8; stroke-width: 2; }
      .recovery-node { fill: #2f1717; stroke: #fb7185; stroke-width: 2; }
      .output-pill { fill: #0d2418; stroke: #22c55e; stroke-width: 2; }
      .flow { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .evidence { stroke: #86efac; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow-evidence); }
      .legend-box { fill: #111827; stroke: #475569; stroke-width: 2; }
      .entry { fill: none; stroke: #f8fafc; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1" />
    </marker>
    <marker id="arrow-evidence" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#86efac" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1000" fill="#020617" />

  <text class="font title" x="80" y="56">OpenClaw Reliability Stack</text>
  <text class="font section" x="80" y="84">Memory integrity, runtime hygiene, diagnostics, and autonomous recovery for AI agent systems</text>

  <rect class="band" x="80" y="110" width="1240" height="90" rx="16" />
  <text class="font section" x="102" y="136">Operator / Channels</text>
  <rect class="sys" x="130" y="146" width="140" height="36" rx="12" />
  <text class="font node" x="176" y="169">Operator</text>
  <rect class="sys" x="320" y="146" width="150" height="36" rx="12" />
  <text class="font node" x="366" y="169">Channels</text>
  <rect class="sys" x="520" y="146" width="360" height="36" rx="12" />
  <text class="font node" x="558" y="169">Support / GitHub / Tawk / Bot Shop</text>

  <rect class="band runtime" x="80" y="220" width="1240" height="120" rx="16" />
  <text class="font section" x="102" y="246">OpenClaw Runtime</text>
  <rect class="sys" x="130" y="270" width="220" height="44" rx="12" />
  <text class="font node" x="176" y="297">OpenClaw Runtime</text>
  <rect class="sys" x="390" y="270" width="130" height="44" rx="12" />
  <text class="font node" x="431" y="297">Agents</text>
  <rect class="sys" x="550" y="270" width="130" height="44" rx="12" />
  <text class="font node" x="586" y="297">Gateway</text>
  <rect class="sys" x="710" y="270" width="170" height="44" rx="12" />
