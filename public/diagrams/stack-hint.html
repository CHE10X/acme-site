<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACME Stack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased; }
    a { display: block; width: 100%; height: 100%; text-decoration: none; }
    svg { width: 100%; height: 100%; display: block; }
    .wrap { width: 100%; height: 100%; cursor: pointer; }
    .wrap:hover .frame-bd  { stroke-opacity: .65 !important; }
    .wrap:hover .cta-label { opacity: 1 !important; }

    @keyframes pulse-amber { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes pulse-green { 0%,100%{opacity:.4} 50%{opacity:.95} }
    @keyframes pulse-blue  { 0%,100%{opacity:.35} 50%{opacity:.8} }
    @keyframes pulse-dim   { 0%,100%{opacity:.25} 50%{opacity:.6} }
    @keyframes spin-cw     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes spin-ccw    { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
    @keyframes flow-r      { from{stroke-dashoffset:60} to{stroke-dashoffset:0} }

    .pa { animation: pulse-amber 2.5s ease-in-out infinite; }
    .pg { animation: pulse-green 3s   ease-in-out infinite; }
    .pb { animation: pulse-blue  3.4s ease-in-out infinite; }
    .pd { animation: pulse-dim   4s   ease-in-out infinite; }
    .fl  { animation: flow-r 2.8s linear infinite; }
    .fl2 { animation: flow-r 2.8s linear infinite; animation-delay: -.7s; }
    .fl3 { animation: flow-r 2.8s linear infinite; animation-delay: -1.4s; }
    .fl4 { animation: flow-r 2.8s linear infinite; animation-delay: -2.1s; }

    .spin-hex  { transform-origin: 137px 110px; animation: spin-cw  10s linear infinite; }
    .spin-dia  { transform-origin: 420px 105px; animation: spin-ccw  9s linear infinite; }
    .spin-ring { transform-origin: 690px 105px; animation: spin-cw  11s linear infinite; }
    .spin-tri  { transform-origin: 960px 105px; animation: spin-ccw 13s linear infinite; }
  </style>
</head>
<body>
<a href="/products" class="wrap" title="View the ACME Stack">
<svg viewBox="0 0 1100 180"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="ACME four-layer stack — click to view full architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1E252C"/>
      <stop offset="100%" stop-color="#181E25"/>
    </linearGradient>

    <!--
      Per-lane fills: dark base so the glow overlays show clearly.
    -->
    <linearGradient id="fl1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1C2230" stop-opacity="1"/>
      <stop offset="100%" stop-color="#161C28" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fl3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#182428" stop-opacity="1"/>
      <stop offset="100%" stop-color="#121E20" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fl4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#161E2E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#101828" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fl5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#121820" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0C1018" stop-opacity="1"/>
    </linearGradient>

    <!--
      Divider-glow overlays — linear, horizontal, absolute coordinates.
      Each one starts at the divider x with the lane's accent color and fades rightward.
      This simulates light emanating from the divider seam into the lane.
      gradientUnits="userSpaceOnUse" so x1/x2 are in SVG canvas coordinates.
    -->
    <!-- L1: glow from left edge (x=0) rightward, amber -->
    <linearGradient id="glow1" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8A040" stop-opacity=".28"/>
      <stop offset="60%"  stop-color="#E8A040" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#E8A040" stop-opacity="0"/>
    </linearGradient>
    <!-- L3: glow from divider x≈285 rightward, green -->
    <linearGradient id="glow3" x1="285" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4EB87C" stop-opacity=".28"/>
      <stop offset="60%"  stop-color="#4EB87C" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#4EB87C" stop-opacity="0"/>
    </linearGradient>
    <!-- L4: glow from divider x≈555 rightward, blue -->
    <linearGradient id="glow4" x1="555" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6A90B8" stop-opacity=".26"/>
      <stop offset="60%"  stop-color="#6A90B8" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#6A90B8" stop-opacity="0"/>
    </linearGradient>
    <!-- L5: glow from divider x≈820 rightward, muted -->
    <linearGradient id="glow5" x1="820" y1="0" x2="1010" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7A8E9E" stop-opacity=".22"/>
      <stop offset="60%"  stop-color="#7A8E9E" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#7A8E9E" stop-opacity="0"/>
    </linearGradient>

    <!-- amber bottom sweep -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D98A2B" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#D98A2B" stop-opacity=".75"/>
      <stop offset="80%"  stop-color="#D98A2B" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#D98A2B" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft radial glows behind each label group — feathered, no hard edges -->
    <radialGradient id="t-glow-amber" cx="50%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#D98A2B" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#D98A2B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-glow-green" cx="50%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#4A9E6B" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#4A9E6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-glow-blue" cx="50%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#5A80A8" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#5A80A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-glow-dim" cx="50%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#6A8090" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#6A8090" stop-opacity="0"/>
    </radialGradient>

    <!-- Shape marker glows -->
    <radialGradient id="g-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#D98A2B" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#D98A2B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#4A9E6B" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#4A9E6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#5A80A8" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#5A80A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-dim" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6A8090" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#6A8090" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r=".6" fill="#2A3444" opacity=".45"/>
    </pattern>
    <clipPath id="clip"><rect width="1100" height="180" rx="5"/></clipPath>
  </defs>

  <!-- bg + dot texture -->
  <rect width="1100" height="180" fill="url(#bg)" rx="5"/>
  <rect width="1100" height="180" fill="url(#dots)" clip-path="url(#clip)"/>

  <!-- ── Lane fills ── -->
  <polygon points="0,180 0,0 295,0 275,180"   fill="url(#fl1)" clip-path="url(#clip)"/>
  <polygon points="275,180 295,0 565,0 545,180" fill="url(#fl3)" clip-path="url(#clip)"/>
  <polygon points="545,180 565,0 830,0 810,180" fill="url(#fl4)" clip-path="url(#clip)"/>
  <polygon points="810,180 830,0 1100,0 1100,180" fill="url(#fl5)" clip-path="url(#clip)"/>

  <!-- ── Lane glow overlays — light from divider leftward edge, fades right ── -->
  <polygon points="0,180 0,0 295,0 275,180"    fill="url(#glow1)" clip-path="url(#clip)"/>
  <polygon points="275,180 295,0 565,0 545,180" fill="url(#glow3)" clip-path="url(#clip)"/>
  <polygon points="545,180 565,0 830,0 810,180" fill="url(#glow4)" clip-path="url(#clip)"/>
  <polygon points="810,180 830,0 1100,0 1100,180" fill="url(#glow5)" clip-path="url(#clip)"/>

  <!-- ── Divider lines — bright accent, the "seam" light source ── -->
  <line x1="295" y1="0" x2="275" y2="180" stroke="#E8A040" stroke-width="1.2" opacity=".55"/>
  <line x1="565" y1="0" x2="545" y2="180" stroke="#4EB87C" stroke-width="1.2" opacity=".5"/>
  <line x1="830" y1="0" x2="810" y2="180" stroke="#6A90B8" stroke-width="1.2" opacity=".45"/>

  <!-- ── Harmonious flow lines — all lanes, same pattern, staggered ── -->
  <line class="fl"  x1="0" y1="128" x2="1100" y2="128" stroke="#D98A2B" stroke-width=".6" stroke-dasharray="10 8" opacity=".16"/>
  <line class="fl2" x1="0" y1="141" x2="1100" y2="141" stroke="#4A9E6B" stroke-width=".6" stroke-dasharray="10 8" opacity=".13"/>
  <line class="fl3" x1="0" y1="153" x2="1100" y2="153" stroke="#5A80A8" stroke-width=".6" stroke-dasharray="10 8" opacity=".11"/>
  <line class="fl4" x1="0" y1="164" x2="1100" y2="164" stroke="#9AA3AD" stroke-width=".5" stroke-dasharray="10 8" opacity=".07"/>

  <!-- ══ LABELS — plain text, no boxes, softened by the ellipse glow above ══ -->

  <!-- L1: Reliability -->
  <text x="137" y="44"
        font-size="13" font-weight="700" fill="#E8A040"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">RELIABILITY</text>
  <text x="137" y="60"
        font-size="7.5" font-weight="600" fill="#C88830"
        font-family="Inter,system-ui,sans-serif"
        letter-spacing=".12em" text-anchor="middle">● LIVE · 5 PRODUCTS</text>

  <!-- L3: Execution & Routing -->
  <text x="408" y="40"
        font-size="11" font-weight="600" fill="#4EB87C"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">EXECUTION</text>
  <text x="408" y="55"
        font-size="11" font-weight="600" fill="#4EB87C"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">&amp; ROUTING</text>
  <text x="408" y="70"
        font-size="7.5" font-weight="600" fill="#3A8858"
        font-family="Inter,system-ui,sans-serif"
        letter-spacing=".12em" text-anchor="middle">● LIVE</text>

  <!-- L4: Governance & Control -->
  <text x="678" y="40"
        font-size="11" font-weight="600" fill="#6A90B8"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">GOVERNANCE</text>
  <text x="678" y="55"
        font-size="11" font-weight="600" fill="#6A90B8"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">&amp; CONTROL</text>
  <text x="678" y="72"
        font-size="7.5" fill="#3A5870" font-family="Inter,system-ui,sans-serif"
        letter-spacing=".1em" text-anchor="middle" font-style="italic">coming</text>

  <!-- L5: Operator Surface -->
  <text x="960" y="40"
        font-size="11" font-weight="600" fill="#7A8E9E"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">OPERATOR</text>
  <text x="960" y="55"
        font-size="11" font-weight="600" fill="#7A8E9E"
        font-family="'Inter',system-ui,sans-serif"
        letter-spacing=".08em" text-anchor="middle">SURFACE</text>
  <text x="960" y="72"
        font-size="7.5" fill="#425060" font-family="Inter,system-ui,sans-serif"
        letter-spacing=".1em" text-anchor="middle" font-style="italic">coming</text>

  <!-- ══ GEOMETRIC MARKERS ══ -->

  <!-- L1: Hexagon -->
  <circle cx="137" cy="110" r="28" fill="url(#g-amber)"/>
  <polygon points="137,88 155,99 155,121 137,132 119,121 119,99"
           fill="none" stroke="#E8A040" stroke-width="1.4" stroke-opacity=".8"/>
  <polygon class="spin-hex" points="137,82 159,95 159,125 137,138 115,125 115,95"
           fill="none" stroke="#E8A040" stroke-width=".65"
           stroke-dasharray="5 3" stroke-opacity=".3"/>
  <circle class="pa" cx="137" cy="110" r="4" fill="#E8A040" filter="url(#glow)"/>

  <!-- L3: Diamond -->
  <circle cx="420" cy="110" r="26" fill="url(#g-green)"/>
  <polygon points="420,88 443,110 420,132 397,110"
           fill="none" stroke="#4EB87C" stroke-width="1.4" stroke-opacity=".8"/>
  <polygon class="spin-dia" points="420,82 447,110 420,138 393,110"
           fill="none" stroke="#4EB87C" stroke-width=".65"
           stroke-dasharray="5 3" stroke-opacity=".28"/>
  <circle class="pg" cx="420" cy="110" r="4" fill="#4EB87C" filter="url(#glow)"/>

  <!-- L4: Concentric rings -->
  <circle cx="690" cy="110" r="26" fill="url(#g-blue)"/>
  <circle class="spin-ring" cx="690" cy="110" r="22"
          fill="none" stroke="#6A90B8" stroke-width=".65"
          stroke-dasharray="5 3" stroke-opacity=".3"/>
  <circle cx="690" cy="110" r="15"
          fill="none" stroke="#6A90B8" stroke-width="1.3" stroke-opacity=".75"/>
  <circle cx="690" cy="110" r="7"
          fill="none" stroke="#6A90B8" stroke-width=".8" stroke-opacity=".45"/>
  <circle class="pb" cx="690" cy="110" r="3.5" fill="#6A90B8" filter="url(#glow)"/>

  <!-- L5: Triangle -->
  <circle cx="960" cy="110" r="25" fill="url(#g-dim)"/>
  <polygon points="960,88 982,127 938,127"
           fill="none" stroke="#7A8E9E" stroke-width="1.4" stroke-opacity=".75"/>
  <polygon class="spin-tri" points="960,81 988,131 932,131"
           fill="none" stroke="#7A8E9E" stroke-width=".65"
           stroke-dasharray="5 3" stroke-opacity=".25"/>
  <circle class="pd" cx="960" cy="112" r="3.5" fill="#8A9AAA" filter="url(#glow)"/>

  <!-- ── amber sweep line ── -->
  <line x1="0" y1="177" x2="1100" y2="177" stroke="url(#sweep)" stroke-width="1.5"/>

  <!-- ── CTA — always readable ── -->
  <text class="cta-label" x="1082" y="167"
        font-size="9.5" fill="#D98A2B"
        font-family="'Inter',system-ui,sans-serif"
        text-anchor="end" font-weight="600" letter-spacing=".12em"
        opacity=".75" style="transition:opacity .2s;">view the stack →</text>

  <!-- frame border -->
  <rect class="frame-bd" width="1100" height="180" fill="none"
        stroke="#D98A2B" stroke-width="1" rx="5"
        stroke-opacity=".2" style="transition:stroke-opacity .2s;"/>
</svg>
</a>
</body>
</html>
