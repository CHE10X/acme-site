<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Reliability Control Plane</title>
  <desc id="desc">OpenClaw reliability control plane flow from system signals to evidence, triage, and operator recovery actions.</desc>
  <defs>
    <style>
      .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .title { font-size: 22px; font-weight: 700; }
      .label { font-size: 14px; font-weight: 600; }
      .small { font-size: 12px; font-weight: 500; fill: #4b5563; }
      .tiny { font-size: 11px; font-weight: 600; fill: #52525b; }
      .band { fill: #f1f5f9; opacity: 0.82; stroke: #cbd5e1; stroke-width: 1.5; vector-effect: non-scaling-stroke; rx: 14; ry: 14; }
      .band-label { font-size: 12px; font-weight: 600; fill: #334155; }
      .card { fill: #ffffff; stroke: #64748b; stroke-width: 2; vector-effect: non-scaling-stroke; rx: 12; ry: 12; }
      .triage-card { fill: #fffbeb; stroke: #d97706; stroke-width: 2.6; vector-effect: non-scaling-stroke; rx: 12; ry: 12; }
      .badge { fill: #f4f4f5; stroke: #a1a1aa; stroke-width: 1; vector-effect: non-scaling-stroke; rx: 8; ry: 8; }
      .line { stroke: #1f2937; stroke-width: 2; fill: none; vector-effect: non-scaling-stroke; marker-end: url(#arr); }
      .ok { fill: #16a34a; }
      .warn { fill: #d97706; }
      .deg { fill: #dc2626; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#ffffff" />
  <text class="t title" x="60" y="56">OpenClaw Reliability Control Plane</text>
  <text class="t small" x="60" y="78">Signals → Evidence → Triage → Recovery</text>
  <rect class="band" x="40" y="120" width="250" height="500" />
  <text class="t band-label" x="52" y="116">System State</text>
  <rect class="band" x="320" y="120" width="250" height="500" />
  <text class="t band-label" x="332" y="116">Protection Surfaces</text>
  <rect class="band" x="600" y="120" width="300" height="500" />
  <text class="t band-label" x="612" y="116">Operator Response</text>
  <rect class="band" x="930" y="120" width="230" height="500" />
  <text class="t band-label" x="942" y="116">Human Control</text>

  <rect class="card" x="70" y="180" width="190" height="64" /><text class="t label" x="98" y="218">BOOT.md</text>
  <rect class="card" x="70" y="280" width="190" height="64" /><text class="t label" x="98" y="318">DIGEST.md</text>
  <rect class="card" x="70" y="380" width="190" height="64" /><text class="t label" x="98" y="418">Digest Builder</text>
  <rect class="badge" x="210" y="386" width="44" height="18" /><text class="t tiny" x="218" y="399">v0.1.x</text>

  <rect class="card" x="350" y="180" width="190" height="64" /><text class="t label" x="378" y="218">Drift Guard</text>
  <rect class="card" x="350" y="280" width="190" height="64" /><text class="t label" x="378" y="312">Sentinel</text><text class="t small" x="378" y="330">(Disk Pressure)</text>
  <rect class="card" x="350" y="380" width="190" height="64" /><text class="t label" x="362" y="418">Watchdog Hygiene Guard</text>
  <rect class="card" x="350" y="480" width="190" height="64" /><text class="t label" x="378" y="518">Disk/Workspace</text>
  <rect class="card" x="350" y="556" width="190" height="52" /><text class="t label" x="403" y="588">Alerts</text>

  <rect class="card" x="630" y="170" width="190" height="64" /><text class="t label" x="658" y="208">Agent Session</text>
  <rect class="triage-card" x="630" y="275" width="190" height="64" /><text class="t label" x="658" y="313">OCTriageUnit</text>
  <rect class="badge" x="772" y="281" width="42" height="18" /><text class="t tiny" x="780" y="294">v0.1.5</text>
  <rect class="card" x="630" y="370" width="190" height="64" /><text class="t label" x="658" y="408">Proof Bundle</text>
  <rect class="card" x="630" y="475" width="190" height="64" /><text class="t label" x="674" y="513">Agent911</text>

  <rect class="card" x="960" y="180" width="170" height="64" /><text class="t label" x="1005" y="218">Recovery</text>
  <rect class="card" x="960" y="280" width="170" height="64" /><text class="t label" x="995" y="318">Commander</text>
  <rect class="card" x="960" y="380" width="170" height="64" /><text class="t label" x="1006" y="418">Operator</text>
  <rect class="card" x="960" y="480" width="170" height="64" /><text class="t small" x="992" y="507">Channels</text><text class="t tiny" x="970" y="525">Channels (Discord/Telegram/Web)</text>
  <rect class="card" x="960" y="556" width="170" height="52" /><text class="t label" x="1012" y="587">Agents</text>

  <path class="line" d="M260 212 H630" />
  <path class="line" d="M260 312 H300 V202 H630" />
  <path class="line" d="M165 380 V344" />
  <path class="line" d="M350 212 H300 V412 H260" />
  <path class="line" d="M350 202 H300 V312 H260" />
  <path class="line" d="M725 234 V275" />
  <path class="line" d="M725 339 V370" />
  <path class="line" d="M445 444 V480" />
  <path class="line" d="M445 344 V556" />
  <path class="line" d="M820 507 H920 V212 H960" />
  <path class="line" d="M1045 344 V380" />
  <path class="line" d="M1045 544 V556" />

  <g transform="translate(940,642)">
    <rect class="badge" x="0" y="0" width="220" height="42" />
    <circle class="ok" cx="18" cy="21" r="5" /><text class="t tiny" x="30" y="25">OK</text>
    <circle class="warn" cx="88" cy="21" r="5" /><text class="t tiny" x="100" y="25">WARN</text>
    <circle class="deg" cx="168" cy="21" r="5" /><text class="t tiny" x="180" y="25">DEGRADED</text>
  </g>
</svg>
