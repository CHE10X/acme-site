<script>
const PRODUCTS = {
  recall: {
    tier: "Operator Surface · L5",
    tierColor: "#D98A2B",
    name: "Recall",
    tag: "E-STOP",
    desc: "Fleet control surface. Stall, freeze, quarantine, or lock down individual agents or the entire stack. The operator's hand on the system when something needs to stop — now.",
    command: "recall status --watch",
    docs: "/docs/recall/overview",
    cta: "/pricing",
    ctaLabel: "Add to Stack"
  },
  dispatch: {
    tier: "Execution & Routing · L3",
    tierColor: "#9AA3AD",
    name: "Dispatch",
    tag: "LIVE",
    desc: "Autonomous task scheduler. Routes work to the right agents automatically, keeps the stack productive when you're not at the keyboard.",
    command: "dispatch run",
    docs: "/docs/dispatch",
    cta: "/pricing",
    ctaLabel: "Get Started"
  },
  transmission: {
    tier: "Execution & Routing · L3",
    tierColor: "#4A5E70",
    name: "Transmission",
    tag: "COMING SOON",
    desc: "Task-aware model routing. Sends each task to the right model at the right cost — automatically. Fixes the economics of running a multi-agent stack.",
    command: "— (coming soon)",
    docs: "/docs/transmission/overview",
    cta: "/pricing",
    ctaLabel: "Learn More"
  },
  radcheck: {
    tier: "Reliability Foundation · L1",
    tierColor: "#4A9E6B",
    name: "RadCheck",
    tag: "FREE",
    desc: "Reliability scoring 0–100. Reads your stack state and surfaces hidden risk before it becomes an incident. The baseline diagnostic every operator should run first.",
    command: "radcheck",
    docs: "/docs/radcheck/score-explained",
    cta: "/docs/octriage/overview",
    ctaLabel: "Run Free"
  },
  sentinel: {
    tier: "Reliability Foundation · L1",
    tierColor: "#4A9E6B",
    name: "Sentinel",
    tag: "ALWAYS ON",
    desc: "Silent failure detection. Continuously monitors your running stack for compaction events, disk pressure, and failure patterns — without adding overhead.",
    command: "sentinel",
    docs: "/docs/sentinel/overview",
    cta: "/pricing",
    ctaLabel: "Add Protection"
  },
  watchdog: {
    tier: "Reliability Foundation · L1",
    tierColor: "#4A9E6B",
    name: "Watchdog",
    tag: "MONITORING",
    desc: "Heartbeat supervision and liveness probes. Catches loops, double-runs, and gateway stalls that logs won't surface until it's too late.",
    command: "watchdog",
    docs: "/docs/watchdog/overview",
    cta: "/pricing",
    ctaLabel: "Add Protection"
  },
  agent911: {
    tier: "Reliability Foundation · L1",
    tierColor: "#C0392B",
    name: "Agent911",
    tag: "COCKPIT",
    desc: "Recovery cockpit. Full stack health view, anomaly classification, and structured recovery guidance in one place. This is the tool you open at 2am when something broke.",
    command: "agent911",
    docs: "/docs/agent911/snapshot-explained",
    cta: "/pricing",
    ctaLabel: "Get Agent911"
  },
  infrawatch: {
    tier: "Reliability Foundation · L1",
    tierColor: "#4A9E6B",
    name: "InfraWatch",
    tag: "WATCHING",
    desc: "Config drift detection for infrastructure. Watches launchd daemons, ingest chains, and routing tables — catches what changes under live load before it cascades.",
    command: "— (bundle only)",
    docs: "/docs/infrawatch/overview",
    cta: "/pricing",
    ctaLabel: "View Bundle"
  },
  lazarus: {
    tier: "Reliability Foundation · L1",
    tierColor: "#4A9E6B",
    name: "Lazarus",
    tag: "READINESS",
    desc: "Backup readiness verification. Confirms your recovery is actually possible before an incident forces the test. Most operators discover their backup posture is wrong during recovery.",
    command: "lazarus --simulate",
    docs: "/docs/lazarus/overview",
    cta: "/pricing",
    ctaLabel: "Get Lazarus"
  },
  sphinxgate: {
    tier: "Access Control · L1",
    tierColor: "#6B88CC",
    name: "SphinxGate",
    tag: "L0 ACCESS",
    desc: "Policy enforcement for model routing. Governs which models run on which workloads — lane discipline for your stack. Nothing passes without clearance.",
    command: "sphinxgate",
    docs: "/docs/sphinxgate/overview",
    cta: "/pricing",
    ctaLabel: "Learn More"
  },
  triage: {
    tier: "Foundation · OSS · Free",
    tierColor: "#D98A2B",
    name: "triage",
    tag: "OSS · ENTRY POINT",
    desc: "First-response diagnostics. Reads directly from the filesystem — no gateway required. Works when OpenClaw doesn't. Run it before you touch anything else.",
    command: "triage --self-test && triage",
    docs: "/docs/triage/overview",
    cta: "https://github.com/acmeagentsupply/triage",
    ctaLabel: "View on GitHub"
  }
};

const pop = document.getElementById('acme-popover');
const popTier = document.getElementById('pop-tier');
const popName = document.getElementById('pop-name');
const popTag = document.getElementById('pop-tag');
const popDesc = document.getElementById('pop-desc');
const popCmd = document.getElementById('pop-command');
const popDocs = document.getElementById('pop-docs');
const popCta = document.getElementById('pop-cta');

function showPop(key, x, y) {
  const d = PRODUCTS[key];
  if (!d) return;
  popTier.textContent = d.tier;
  popTier.style.color = d.tierColor;
  popName.textContent = d.name;
  popTag.textContent = d.tag;
  popDesc.textContent = d.desc;
  popCmd.textContent = d.command;
  popDocs.href = d.docs;
  popCta.href = d.cta;
  popCta.textContent = d.ctaLabel;
  pop.classList.add('visible');

  // Position: prefer right of click, flip left if near edge
  const pw = 360, ph = 320;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 14;
  let top = y - 60;
  if (left + pw > vw - 12) left = x - pw - 14;
  if (top + ph > vh - 12) top = vh - ph - 12;
  if (top < 8) top = 8;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

let hoverTimer = null;
document.querySelectorAll('.card-group[data-link]').forEach(el => {
  el.style.cursor = 'pointer';
  const key = el.id.replace('card-', '').replace('-small','');
  // Click: show immediately
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
    showPop(key, e.clientX, e.clientY);
  });
  // Hover: show after short delay
  el.addEventListener('mouseenter', (e) => {
    hoverTimer = setTimeout(() => showPop(key, e.clientX, e.clientY), 320);
  });
  el.addEventListener('mouseleave', () => {
    if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
  });
});

document.getElementById('pop-close').addEventListener('click', () => pop.classList.remove('visible'));
document.addEventListener('click', (e) => {
  if (!pop.contains(e.target)) pop.classList.remove('visible');
});
</script>
