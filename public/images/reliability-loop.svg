<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" height="220" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace">

  <!-- Background -->
  <rect width="820" height="220" rx="12" fill="#0f172a"/>

  <!-- DETECT box -->
  <rect x="20" y="30" width="170" height="130" rx="8" fill="#1B4D3E" stroke="#52B788" stroke-width="1.5"/>
  <text x="105" y="58" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700" letter-spacing="1.5">🔍 DETECT</text>
  <line x1="40" y1="66" x2="170" y2="66" stroke="#52B788" stroke-width="0.5" opacity="0.4"/>
  <text x="105" y="84" text-anchor="middle" fill="#a7f3d0" font-size="10">RadCheck</text>
  <text x="105" y="100" text-anchor="middle" fill="#a7f3d0" font-size="10">Sentinel</text>
  <text x="105" y="116" text-anchor="middle" fill="#a7f3d0" font-size="10">Watchdog</text>
  <text x="105" y="132" text-anchor="middle" fill="#a7f3d0" font-size="10">FindMyAgent</text>
  <text x="105" y="148" text-anchor="middle" fill="#a7f3d0" font-size="10">SphinxGate</text>

  <!-- Arrow D→T -->
  <line x1="192" y1="95" x2="216" y2="95" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="216,90 226,95 216,100" fill="#94a3b8"/>

  <!-- TRIAGE box -->
  <rect x="228" y="30" width="170" height="130" rx="8" fill="#312E81" stroke="#818CF8" stroke-width="1.5"/>
  <text x="313" y="58" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700" letter-spacing="1.5">📋 TRIAGE</text>
  <line x1="248" y1="66" x2="378" y2="66" stroke="#818CF8" stroke-width="0.5" opacity="0.4"/>
  <text x="313" y="90" text-anchor="middle" fill="#e0e7ff" font-size="10">OCTriage</text>
  <text x="313" y="106" text-anchor="middle" fill="#e0e7ff" font-size="10">DriftGuard</text>

  <!-- Arrow T→R -->
  <line x1="400" y1="95" x2="424" y2="95" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="424,90 434,95 424,100" fill="#94a3b8"/>

  <!-- RECOVER box -->
  <rect x="436" y="30" width="170" height="130" rx="8" fill="#7C2D12" stroke="#FB923C" stroke-width="1.5"/>
  <text x="521" y="58" text-anchor="middle" fill="#fed7aa" font-size="11" font-weight="700" letter-spacing="1.5">🔧 RECOVER</text>
  <line x1="456" y1="66" x2="586" y2="66" stroke="#FB923C" stroke-width="0.5" opacity="0.4"/>
  <text x="521" y="90" text-anchor="middle" fill="#ffedd5" font-size="10">Agent911</text>
  <text x="521" y="106" text-anchor="middle" fill="#ffedd5" font-size="10">Recall</text>

  <!-- Arrow R→V -->
  <line x1="608" y1="95" x2="632" y2="95" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="632,90 642,95 632,100" fill="#94a3b8"/>

  <!-- VERIFY box -->
  <rect x="644" y="30" width="155" height="130" rx="8" fill="#1E3A5F" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="721" y="58" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700" letter-spacing="1.5">✅ VERIFY</text>
  <line x1="664" y1="66" x2="779" y2="66" stroke="#60A5FA" stroke-width="0.5" opacity="0.4"/>
  <text x="721" y="90" text-anchor="middle" fill="#dbeafe" font-size="10">Lazarus</text>

  <!-- Continuous loop arrow (bottom, V → D) -->
  <path d="M721 162 Q721 190 400 190 Q79 190 105 162" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="104,162 99,172 110,172" fill="#64748b"/>
  <text x="410" y="207" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">continuous loop · Transmission signal bus</text>

</svg>
