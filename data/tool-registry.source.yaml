# tool-registry.source.yaml
# Authoritative version + artifact feed for ACME Agent Supply Co. tools
# Maintained by Hendrik (Ops). Used by scripts/generate-registry.mjs to produce public/registry.json
# Update this file on every release. Do not guess — pull from actual build artifacts.
#
# Schema:
#   productKey:     matches metadata.productKey in Stripe catalog
#   category:       Schema.org / apple-category style (see category_truth table below)
#   os:             cross-platform | macos | linux | windows
#   repo:           GitHub repo (owner/name)
#   latest:         latest release tag (git tag)
#   version:        semver string (no v prefix)
#   artifact:       release zip filename
#   sha256:         sha256 of release zip (from build artifacts)
#   install:        canonical install command (shell-safe)
#   install_docs:   URL to full install docs
#   status:         ga | beta | alpha

