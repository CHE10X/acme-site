# ─────────────────────────────────────────────────────────────────────────────
# CATEGORY + OS TRUTH TABLE
# ─────────────────────────────────────────────────────────────────────────────
#
# category values (Schema.org / structured data):
#   DeveloperApplication  — diagnostic, scan, triage tools (OCTriageUnit, RadCheck, Agent911, Lazarus)
#   UtilitiesApplication  — runtime protection modules (Sentinel, DriftGuard, SphinxGate, etc.)
#
# os values:
#   cross-platform  — shell/Node.js based, runs on macOS + Linux (and WSL on Windows)
#   macos           — macOS only (e.g. .app bundles)
#   linux           — Linux only
#
# Per-tool decisions:
#   OCTriageUnit      → DeveloperApplication  | cross-platform (bash + curl, macOS + Linux confirmed)
#   Sentinel          → UtilitiesApplication  | cross-platform
#   RadCheck          → DeveloperApplication  | cross-platform
#   Agent911          → DeveloperApplication  | cross-platform
#   DriftGuard        → UtilitiesApplication  | cross-platform
#   SphinxGate        → UtilitiesApplication  | cross-platform
#   Transmission      → UtilitiesApplication  | cross-platform
#   Watchdog          → UtilitiesApplication  | cross-platform
#   Lazarus           → DeveloperApplication  | cross-platform
#   FindMyAgent       → UtilitiesApplication  | cross-platform
#   Operator Kit      → UtilitiesApplication  | cross-platform
#
# NOTE: OCTriageUnit ships a macOS .app bundle (Applications/OCTriageUnit.app)
# but the core binary (bin/control-plane-triage) is a bash script.
# For registry purposes: cross-platform is correct. The .app is a launcher convenience.
